name: Build MalumMenu

on:
  push:
    branches: [main]
    paths:
      - 'MalumMenu/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: MalumMenu

    steps:
      - uses: actions/checkout@v4

      - name: Build dylib with Xcode clang
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=14.0 \
            -dynamiclib \
            -o MalumMenu.dylib \
            TweakEntry.mm Hooks.mm FloatingOverlay.mm \
            -framework UIKit \
            -framework Foundation \
            -framework CoreGraphics \
            -framework QuartzCore \
            -lobjc -lc++ \
            -fobjc-arc \
            -I. \
            -DFLOATING_OVERLAY_USE_SDK

      - name: Strip and sign
        run: |
          strip -S MalumMenu.dylib
          codesign -f -s - MalumMenu.dylib

      - uses: actions/upload-artifact@v4
        with:
          name: MalumMenu-dylib
          path: MalumMenu/MalumMenu.dylib

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: MalumMenu-dylib

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.1.0"
          if gh release view "$TAG" --json tagName --jq .tagName &>/dev/null; then
            gh release upload "$TAG" MalumMenu.dylib --clobber
          fi
